name: Build CSS
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:css
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build CSS"
          file_pattern: css/output.css
